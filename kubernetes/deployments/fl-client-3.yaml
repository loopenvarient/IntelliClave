apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-client-3
  namespace: intelliclave
  labels:
    app: fl-client-3
    role: fl-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-client-3
  template:
    metadata:
      labels:
        app: fl-client-3
        role: fl-client
    spec:
      containers:
      - name: fl-client-3
        image: fl-client-image:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CLIENT_ID
          value: "3"
        - name: SERVER_ADDR
          value: "fl-server-service:8080"
        - name: CSV_PATH
          value: "/app/data/processed/client3.csv"
        - name: USE_CRYPTO
          value: "--crypto"
        - name: USE_DP
          value: "--dp"
        - name: EPSILON
          value: "1.0"
        - name: MIXUP_ALPHA
          value: "0.2"
        - name: ROUNDS
          value: "20"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        volumeMounts:
        - name: client-data
          mountPath: /app/data/processed
          readOnly: true
        - name: crypto-keys
          mountPath: /app/crypto/certs/keys
          readOnly: true
      volumes:
      - name: client-data
        persistentVolumeClaim:
          claimName: client-3-pvc
      - name: crypto-keys
        secret:
          secretName: fl-crypto-keys
