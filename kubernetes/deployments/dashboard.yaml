apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
  namespace: intelliclave
  labels:
    app: dashboard-backend
    role: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
        role: dashboard
    spec:
      containers:
      - name: dashboard-backend
        image: intelliclave-dashboard:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: REQUIRE_REDIS
          value: "true"
        - name: DASHBOARD_STATE_DIR
          value: "/app/results"
        - name: RESULTS_DIR
          value: "/app/results"
        - name: CORS_ORIGINS
          value: "http://localhost:3000"
        - name: INFERENCE_EPSILON
          value: "4.0"
        - name: LIFETIME_QUERY_BUDGET
          value: "10000"
        - name: RATE_LIMIT_MAX
          value: "100"
        - name: RATE_LIMIT_WINDOW
          value: "60"
        - name: REQUIRE_SEALED_CHECKPOINTS
          value: "true"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: server-results
          mountPath: /app/results
          readOnly: true
      volumes:
      - name: server-results
        persistentVolumeClaim:
          claimName: fl-server-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: intelliclave
spec:
  selector:
    app: dashboard-backend
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
  type: ClusterIP
