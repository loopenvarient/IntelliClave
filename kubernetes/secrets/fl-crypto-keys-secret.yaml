# ── fl-crypto-keys Secret ─────────────────────────────────────────────────────
# Holds the RSA-2048 server keypair used by the crypto layer.
#
# HOW TO CREATE (run once before deploying):
#
#   # 1. Generate the keypair
#   python crypto/certs/crypto_context.py
#   # This writes:
#   #   crypto/certs/keys/server_private.pem
#   #   crypto/certs/keys/server_public.pem
#
#   # 2. Create the K8s secret from the generated files
#   kubectl create secret generic fl-crypto-keys \
#     --from-file=server_private.pem=crypto/certs/keys/server_private.pem \
#     --from-file=server_public.pem=crypto/certs/keys/server_public.pem \
#     --namespace=intelliclave
#
# DO NOT commit actual key files to git.
# This YAML is a reference template only — keys are created at deploy time.
#
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fl-crypto-keys
  namespace: intelliclave
  labels:
    app: intelliclave
    component: crypto
type: Opaque
# data fields are populated by kubectl create secret (see instructions above)
# data:
#   server_private.pem: <base64-encoded PEM>
#   server_public.pem:  <base64-encoded PEM>
