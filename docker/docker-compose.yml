version: "3.9"



# ── IntelliClave — full stack (3 FL clients + Redis + dashboard API + UI) ─────

#

#   docker compose -f docker/docker-compose.yml up --build

#

# For N clients:

#   python docker/generate_compose.py --clients 5

#   docker compose -f docker/docker-compose.generated.yml up --build



x-fl-client: &fl-client

  build:

    context: ..

    dockerfile: docker/Dockerfile.client

  depends_on:

    fl-server:

      condition: service_healthy

  networks:

    - fl-net

  restart: on-failure

  volumes:

    - ../crypto/certs/keys:/app/crypto/certs/keys:ro

    - server-results:/app/results:ro

  environment:

    SERVER_ADDR:              "fl-server:8080"

    USE_CRYPTO:               "${USE_CRYPTO:---crypto}"

    USE_DP:                   "${USE_DP:---dp}"

    EPSILON:                  "${EPSILON:-10.0}"

    ROUNDS:                   "${ROUNDS:-10}"

    MODEL_TYPE:               "${MODEL_TYPE:-mlp}"

    DASHBOARD_STATE_DIR:      "/app/results"

    ATTESTATION_RECORD_PATH:  "/app/results/attestation.json"



services:



  redis:

    image: redis:7-alpine

    container_name: intelliclave-redis

    networks:

      - fl-net

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 5s

      timeout: 3s

      retries: 5

    volumes:

      - redis-data:/data



  dashboard-backend:

    build:

      context: ..

      dockerfile: dashboard/backend/Dockerfile

    container_name: dashboard-backend

    ports:

      - "8001:8001"

    depends_on:

      redis:

        condition: service_healthy

    networks:

      - fl-net

    environment:

      REDIS_URL:                  "redis://redis:6379/0"

      REQUIRE_REDIS:              "true"

      CORS_ORIGINS:               "http://localhost:3000"

      DASHBOARD_STATE_DIR:        "/app/results"

      INFERENCE_EPSILON:          "${INFERENCE_EPSILON:-4.0}"

      LIFETIME_QUERY_BUDGET:      "${LIFETIME_QUERY_BUDGET:-10000}"

      RATE_LIMIT_MAX:             "${RATE_LIMIT_MAX:-100}"

      RATE_LIMIT_WINDOW:          "${RATE_LIMIT_WINDOW:-60}"

      REQUIRE_SEALED_CHECKPOINTS: "${REQUIRE_SEALED_CHECKPOINTS:-false}"

    volumes:

      - server-results:/app/results:ro

      - ../results/benchmarks_baseline.json:/app/results/benchmarks_baseline.json:ro



  dashboard-frontend:

    build:

      context: ..

      dockerfile: dashboard/frontend/Dockerfile

      args:

        VITE_API_URL: "http://localhost:8001"

    container_name: dashboard-frontend

    ports:

      - "3000:3000"

    depends_on:

      - dashboard-backend

    networks:

      - fl-net



  fl-server:

    build:

      context: ..

      dockerfile: docker/Dockerfile.server

    container_name: fl-server

    ports:

      - "8080:8080"

    volumes:

      - server-results:/app/results

      - ../crypto/certs/keys:/app/crypto/certs/keys:ro

      - ../results/benchmarks_baseline.json:/app/results/benchmarks_baseline.json:ro

    networks:

      - fl-net

    environment:

      ROUNDS:                "${ROUNDS:-10}"

      MIN_CLIENTS:           "${N_CLIENTS:-3}"

      ADDRESS:               "0.0.0.0:8080"

      USE_CRYPTO:            "${USE_CRYPTO:---crypto}"

      STRATEGY:              "${STRATEGY:-fedavg}"

      FRACTION_FIT:          "${FRACTION_FIT:-1.0}"

      ROUND_TIMEOUT:         "${ROUND_TIMEOUT:-300}"

      RESUME:                "${RESUME:-}"

      SAVE_DIR:              "/app/results/fl_rounds"

      DASHBOARD_STATE_DIR:   "/app/results"

      SEAL_REMOVE_PLAINTEXT: "${SEAL_REMOVE_PLAINTEXT:-true}"

    healthcheck:

      test: ["CMD", "python", "-c",

             "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8080)); s.close()"]

      interval: 5s

      timeout: 5s

      retries: 12

      start_period: 15s



  fl-client-1:

    <<: *fl-client

    container_name: fl-client-1

    volumes:

      - ../data/processed/client1.csv:/app/data/processed/client1.csv:ro

      - ../crypto/certs/keys:/app/crypto/certs/keys:ro

      - server-results:/app/results:ro

    environment:

      CLIENT_ID:                "1"

      CSV_PATH:                 "/app/data/processed/client1.csv"

      SERVER_ADDR:              "fl-server:8080"

      USE_CRYPTO:               "${USE_CRYPTO:---crypto}"

      USE_DP:                   "${USE_DP:---dp}"

      EPSILON:                  "${EPSILON:-10.0}"

      ROUNDS:                   "${ROUNDS:-10}"

      MODEL_TYPE:               "${MODEL_TYPE:-mlp}"

      DASHBOARD_STATE_DIR:      "/app/results"

      ATTESTATION_RECORD_PATH:  "/app/results/attestation.json"



  fl-client-2:

    <<: *fl-client

    container_name: fl-client-2

    volumes:

      - ../data/processed/client2.csv:/app/data/processed/client2.csv:ro

      - ../crypto/certs/keys:/app/crypto/certs/keys:ro

      - server-results:/app/results:ro

    environment:

      CLIENT_ID:                "2"

      CSV_PATH:                 "/app/data/processed/client2.csv"

      SERVER_ADDR:              "fl-server:8080"

      USE_CRYPTO:               "${USE_CRYPTO:---crypto}"

      USE_DP:                   "${USE_DP:---dp}"

      EPSILON:                  "${EPSILON:-10.0}"

      ROUNDS:                   "${ROUNDS:-10}"

      MODEL_TYPE:               "${MODEL_TYPE:-mlp}"

      DASHBOARD_STATE_DIR:      "/app/results"

      ATTESTATION_RECORD_PATH:  "/app/results/attestation.json"



  fl-client-3:

    <<: *fl-client

    container_name: fl-client-3

    volumes:

      - ../data/processed/client3.csv:/app/data/processed/client3.csv:ro

      - ../crypto/certs/keys:/app/crypto/certs/keys:ro

      - server-results:/app/results:ro

    environment:

      CLIENT_ID:                "3"

      CSV_PATH:                 "/app/data/processed/client3.csv"

      SERVER_ADDR:              "fl-server:8080"

      USE_CRYPTO:               "${USE_CRYPTO:---crypto}"

      USE_DP:                   "${USE_DP:---dp}"

      EPSILON:                  "${EPSILON:-10.0}"

      ROUNDS:                   "${ROUNDS:-10}"

      MODEL_TYPE:               "${MODEL_TYPE:-mlp}"

      DASHBOARD_STATE_DIR:      "/app/results"

      ATTESTATION_RECORD_PATH:  "/app/results/attestation.json"



volumes:

  server-results:

    driver: local

  redis-data:

    driver: local



networks:

  fl-net:

    driver: bridge

    ipam:

      config:

        - subnet: 172.20.0.0/24


