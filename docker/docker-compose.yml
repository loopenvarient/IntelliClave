version: "3.9"

# ── IntelliClave — FL + DP + Crypto full stack ────────────────────────────────
#
# This file is the BASE compose for the server + a single client template.
# For multi-client deployments, use the generator script instead:
#
#   python docker/generate_compose.py --clients 3   # generates docker-compose.generated.yml
#   docker compose -f docker/docker-compose.generated.yml up --build
#
# Or use this file directly for a single-client test:
#   docker compose -f docker/docker-compose.yml up --build
#
# Environment variables:
#   N_CLIENTS  : number of FL clients (used by generate_compose.py, default 3)
#   USE_CRYPTO : "--crypto" (default) | ""
#   USE_DP     : "--dp" (default) | ""
#   EPSILON    : DP budget target (default 10.0)
#   ROUNDS     : FL rounds — must be same for server and all clients (default 10)
#   STRATEGY   : fedavg | fedprox (default fedavg)
#   FRACTION_FIT: fraction of clients per round (default 1.0)
#   MODEL_TYPE : mlp | resnet-tabular | transformer-tabular (default mlp)

services:

  # ── FL Server ───────────────────────────────────────────────────────────────
  fl-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: fl-server
    ports:
      - "8080:8080"
    volumes:
      - server-results:/app/results
      - ../crypto/certs/keys:/app/crypto/certs/keys
    networks:
      - fl-net
    environment:
      ROUNDS:        "${ROUNDS:-10}"
      MIN_CLIENTS:   "${N_CLIENTS:-3}"
      ADDRESS:       "0.0.0.0:8080"
      USE_CRYPTO:    "${USE_CRYPTO:---crypto}"
      STRATEGY:      "${STRATEGY:-fedavg}"
      FRACTION_FIT:  "${FRACTION_FIT:-1.0}"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8080)); s.close()"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ── FL Client 1 (template — use generate_compose.py for N clients) ──────────
  fl-client-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: fl-client-1
    depends_on:
      fl-server:
        condition: service_healthy
    networks:
      - fl-net
    restart: on-failure
    volumes:
      - ../data/processed/client1.csv:/app/data/processed/client1.csv:ro
      - ../crypto/certs/keys:/app/crypto/certs/keys:ro
    environment:
      CLIENT_ID:   "1"
      CSV_PATH:    "/app/data/processed/client1.csv"
      SERVER_ADDR: "fl-server:8080"
      USE_CRYPTO:  "${USE_CRYPTO:---crypto}"
      USE_DP:      "${USE_DP:---dp}"
      EPSILON:     "${EPSILON:-10.0}"
      ROUNDS:      "${ROUNDS:-10}"
      MODEL_TYPE:  "${MODEL_TYPE:-mlp}"

volumes:
  server-results:
    driver: local

networks:
  fl-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
