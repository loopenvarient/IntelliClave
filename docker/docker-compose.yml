version: "3.9"

# ── IntelliClave — FL + DP + Crypto full stack ────────────────────────────────
#
# Usage (FL + DP + crypto — default):
#   docker compose -f docker/docker-compose.yml up --build
#
# Usage (FL + crypto, no DP):
#   USE_DP="" docker compose -f docker/docker-compose.yml up --build
#
# Usage (FL only, no crypto, no DP):
#   USE_CRYPTO="" USE_DP="" docker compose -f docker/docker-compose.yml up --build
#
# Override rounds:
#   ROUNDS=5 docker compose -f docker/docker-compose.yml up --build
#
# Environment variables:
#   USE_CRYPTO : "--crypto" (default) | ""
#   USE_DP     : "--dp" (default) | ""
#   EPSILON    : DP budget target (default 10.0)
#   ROUNDS     : FL rounds — must be same for server and all clients (default 20)

# ── Shared client config ──────────────────────────────────────────────────────
x-client-base: &client-base
  build:
    context: ..
    dockerfile: docker/Dockerfile.client
  depends_on:
    fl-server:
      condition: service_healthy
  networks:
    - fl-net
  restart: on-failure

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── FL Server ───────────────────────────────────────────────────────────────
  fl-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: fl-server
    ports:
      - "8080:8080"
    volumes:
      - server-results:/app/results
      - ../crypto/certs/keys:/app/crypto/certs/keys:ro
    networks:
      - fl-net
    environment:
      ROUNDS:      "${ROUNDS:-20}"
      MIN_CLIENTS: "3"
      ADDRESS:     "0.0.0.0:8080"
      USE_CRYPTO:  "${USE_CRYPTO:---crypto}"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8080)); s.close()"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ── FL Client 1 — FitLife (active profile) ──────────────────────────────────
  fl-client-1:
    <<: *client-base
    container_name: fl-client-1
    volumes:
      - ../data/processed/client1.csv:/app/data/processed/client1.csv:ro
      - ../crypto/certs/keys:/app/crypto/certs/keys:ro
    environment:
      CLIENT_ID:   "1"
      CSV_PATH:    "/app/data/processed/client1.csv"
      SERVER_ADDR: "fl-server:8080"
      USE_CRYPTO:  "${USE_CRYPTO:---crypto}"
      USE_DP:      "${USE_DP:---dp}"
      EPSILON:     "${EPSILON:-10.0}"
      ROUNDS:      "${ROUNDS:-20}"

  # ── FL Client 2 — MediTrack (mixed profile) ─────────────────────────────────
  fl-client-2:
    <<: *client-base
    container_name: fl-client-2
    volumes:
      - ../data/processed/client2.csv:/app/data/processed/client2.csv:ro
      - ../crypto/certs/keys:/app/crypto/certs/keys:ro
    environment:
      CLIENT_ID:   "2"
      CSV_PATH:    "/app/data/processed/client2.csv"
      SERVER_ADDR: "fl-server:8080"
      USE_CRYPTO:  "${USE_CRYPTO:---crypto}"
      USE_DP:      "${USE_DP:---dp}"
      EPSILON:     "${EPSILON:-10.0}"
      ROUNDS:      "${ROUNDS:-20}"

  # ── FL Client 3 — CareWatch (sedentary profile) ─────────────────────────────
  fl-client-3:
    <<: *client-base
    container_name: fl-client-3
    volumes:
      - ../data/processed/client3.csv:/app/data/processed/client3.csv:ro
      - ../crypto/certs/keys:/app/crypto/certs/keys:ro
    environment:
      CLIENT_ID:   "3"
      CSV_PATH:    "/app/data/processed/client3.csv"
      SERVER_ADDR: "fl-server:8080"
      USE_CRYPTO:  "${USE_CRYPTO:---crypto}"
      USE_DP:      "${USE_DP:---dp}"
      EPSILON:     "${EPSILON:-10.0}"
      ROUNDS:      "${ROUNDS:-20}"

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  server-results:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  fl-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
